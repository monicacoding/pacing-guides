<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Trail Anadia – Race Day</title>
<style>
:root{
  --ink:#111;--muted:#777;--border:#e8e8e8;--bg:#f4f3f0;--card:#fff;
  --ap:#B87317;--a:#2d6a0a;--b:#185FA5;
  --red:#c0392b;--green:#27ae60;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--ink);font-size:15px;-webkit-tap-highlight-color:transparent;}

/* ── HEADER ── */
.header{background:#111;color:#fff;padding:14px 16px 12px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.3);}
.h-eyebrow{font-size:11px;color:rgba(255,255,255,.5);letter-spacing:.04em;margin-bottom:3px;}
.h-title{font-size:17px;font-weight:700;margin-bottom:10px;}
.goal-tabs{display:flex;gap:7px;}
.gtab{
  flex:1;padding:9px 6px 8px;border-radius:9px;
  border:1.5px solid rgba(255,255,255,.18);
  background:rgba(255,255,255,.06);
  color:rgba(255,255,255,.55);
  font-size:14px;font-weight:600;cursor:pointer;
  font-family:inherit;text-align:center;line-height:1;
  transition:background .15s,border-color .15s,color .15s;
}
.gtab small{display:block;font-size:11px;font-weight:400;margin-top:3px;opacity:.85;}
.gtab.active.g-ap{border-color:#e8a230;color:#f5c06a;background:rgba(184,115,23,.2);}
.gtab.active.g-a{border-color:#7dba5a;color:#a0d47a;background:rgba(45,106,10,.18);}
.gtab.active.g-b{border-color:#6fa8dc;color:#90c0f0;background:rgba(24,95,165,.2);}

/* ── BODY ── */
.body{padding:12px 12px 40px;}

/* ── CHECKPOINT CARD ── */
.cp-card{
  background:var(--card);border-radius:14px;
  border:1.5px solid var(--border);
  margin-bottom:14px;overflow:hidden;
  transition:opacity .25s;
}
.cp-card.done{opacity:.28;}

/* card top */
.ct{padding:13px 14px 11px;}
.ct-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px;}
.ct-km{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.09em;color:var(--muted);}
.ct-temp{font-size:12px;font-weight:700;color:var(--red);background:#fef0ee;padding:2px 8px;border-radius:20px;}
.ct-name{font-size:18px;font-weight:700;line-height:1.2;}
.ct-sub{font-size:11.5px;color:var(--muted);margin-top:4px;line-height:1.4;}

/* stats */
.stats{display:grid;grid-template-columns:repeat(3,1fr);border-top:1px solid var(--border);border-bottom:1px solid var(--border);}
.stat{padding:11px 6px;text-align:center;}
.stat+.stat{border-left:1px solid var(--border);}
.stat-val{font-size:17px;font-weight:800;line-height:1;font-variant-numeric:tabular-nums;}
.stat-lbl{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-top:4px;}

/* checklist */
.checklist{padding:11px 14px;border-bottom:1px solid var(--border);}
.cl-hdr{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.09em;color:var(--muted);margin-bottom:8px;}
.cl-item{display:flex;align-items:center;gap:10px;padding:7px 0;cursor:pointer;user-select:none;}
.cl-item:not(:last-child){border-bottom:.5px solid #f2f2f2;}
.cl-box{
  width:22px;height:22px;border-radius:6px;border:1.5px solid #d0d0d0;
  background:#fff;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:background .12s,border-color .12s;
}
.cl-box.on{background:var(--green);border-color:var(--green);}
.cl-box.on::after{content:'✓';color:#fff;font-size:13px;font-weight:700;}
.cl-text{font-size:13.5px;color:var(--ink);line-height:1.4;flex:1;}
.cl-text.done{text-decoration:line-through;color:#c0c0c0;}

/* matrix */
.matrix{padding:11px 14px;border-bottom:1px solid var(--border);}
.mx-hdr{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.09em;color:var(--muted);margin-bottom:8px;}
.mx-rows{display:flex;flex-direction:column;gap:5px;}
.mx-btn{
  display:flex;align-items:center;gap:0;
  border-radius:9px;border:1.5px solid var(--border);
  background:#f8f8f6;cursor:pointer;font-family:inherit;
  width:100%;text-align:left;overflow:hidden;
  transition:border-color .15s,background .15s;
}
.mx-lbl{
  width:38px;padding:10px 0;text-align:center;
  font-size:14px;font-weight:800;flex-shrink:0;
  border-right:1.5px solid var(--border);
  background:#f2f2ef;
}
.mx-body{flex:1;padding:9px 11px;display:flex;flex-direction:column;gap:2px;}
.mx-win{font-size:14px;font-weight:700;font-variant-numeric:tabular-nums;color:var(--ink);}
.mx-pace{font-size:11.5px;color:var(--muted);}
/* selected states */
.mx-btn.sel-ap{border-color:#c8891a;background:#fff8ed;}
.mx-btn.sel-ap .mx-lbl{background:#fff0d0;border-color:#c8891a;color:#9a5800;}
.mx-btn.sel-a{border-color:#4a9a22;background:#f2faea;}
.mx-btn.sel-a .mx-lbl{background:#dff5cc;border-color:#4a9a22;color:#2a5a08;}
.mx-btn.sel-b{border-color:#2573c4;background:#eef4fd;}
.mx-btn.sel-b .mx-lbl{background:#d0e5fa;border-color:#2573c4;color:#0e4080;}
.mx-btn.sel-off{border-color:#999;background:#f5f5f3;}
.mx-btn.sel-off .mx-lbl{background:#eee;border-color:#999;color:#555;}
/* suggestion */
.mx-sug{
  display:none;margin-top:6px;padding:10px 12px;
  border-radius:9px;font-size:13px;line-height:1.55;
}
.mx-sug.show{display:block;}
.mx-sug b{font-weight:700;}
.sug-ap{background:#fff8ed;border:1.5px solid #e8c87a;color:#5a3200;}
.sug-a{background:#f2faea;border:1.5px solid #8dcc55;color:#1a3d08;}
.sug-b{background:#eef4fd;border:1.5px solid #80b8f0;color:#0a2d5a;}
.sug-off{background:#f5f5f3;border:1.5px solid #bbb;color:#444;}

/* mark passed button */
.mark-row{padding:11px 14px;}
.mark-btn{
  display:block;width:100%;padding:12px;
  border-radius:10px;border:1.5px solid var(--border);
  background:#f8f8f6;color:var(--muted);
  font-family:inherit;font-size:14px;font-weight:600;
  cursor:pointer;text-align:center;
  transition:background .15s,border-color .15s,color .15s;
}
.mark-btn:active{transform:scale(.98);}
.mark-btn.done{background:var(--green);border-color:var(--green);color:#fff;}
</style>
</head>
<body>

<div class="header">
  <div class="h-eyebrow">5° Trail Anadia · 24 Mai 2026 · 9:20 AM · 21.35 km · +653 m</div>
  <div class="h-title">Race Day Guide</div>
  <div class="goal-tabs">
    <button class="gtab g-ap active" onclick="setGoal('ap')">A+<small>2:15:00</small></button>
    <button class="gtab g-a" onclick="setGoal('a')">A<small>2:30:00</small></button>
    <button class="gtab g-b" onclick="setGoal('b')">B<small>2:40:00</small></button>
  </div>
</div>

<div class="body" id="body"></div>

<script>
/* ─── GOAL DATA ─────────────────────────────────────────────────────── */
var G = {
  ap:{
    label:'A+',finish:'2:15:00',color:'#B87317',
    cps:[
      {time:'0:34:00',pace:'5:58/km',hr:'≤ 152',hrCol:'#e67e22'},
      {time:'1:25:00',pace:'7:39/km',hr:'≤ 149 climbs',hrCol:'#e74c3c'},
      {time:'1:53:00',pace:'6:58/km',hr:'≤ 149 climbs',hrCol:'#e74c3c'},
      {time:'2:15:00',pace:'6:19/km',hr:'≤ 149→160',hrCol:'#c0392b'}
    ]
  },
  a:{
    label:'A',finish:'2:30:00',color:'#2d6a0a',
    cps:[
      {time:'0:37:00',pace:'6:29/km',hr:'≤ 147',hrCol:'#27ae60'},
      {time:'1:33:00',pace:'8:22/km',hr:'≤ 143 climbs',hrCol:'#e67e22'},
      {time:'2:04:00',pace:'7:39/km',hr:'≤ 143 climbs',hrCol:'#e67e22'},
      {time:'2:30:00',pace:'7:02/km',hr:'≤ 143→149',hrCol:'#e67e22'}
    ]
  },
  b:{
    label:'B',finish:'2:40:00',color:'#185FA5',
    cps:[
      {time:'0:41:00',pace:'7:11/km',hr:'≤ 135',hrCol:'#2980b9'},
      {time:'1:45:00',pace:'9:27/km',hr:'≤ 132 all',hrCol:'#2980b9'},
      {time:'2:18:00',pace:'8:31/km',hr:'≤ 132 climbs',hrCol:'#2980b9'},
      {time:'2:40:00',pace:'7:29/km',hr:'≤ 132→143',hrCol:'#e67e22'}
    ]
  }
};

/* ─── CHECKPOINT DEFINITIONS ────────────────────────────────────────── */
var CPS = [
  {
    id:'as1',km:'5.7 km',name:'Aid Station 1',temp:'25 °C',
    sub:'+71 m / −33 m · Gentle rolling climb',
    isFinish:false,
    actions:[
      'Consumed one gel (30 min mark).',
      'Spare flask — consumed.',
      'Main flask — approx. half consumed.',
      'Foldable cup — 200 ml.',
      'Refill spare flask if not crowded.'
    ],
    matrix:[
      {g:'ap',l:'A+',c:'#B87317',win:'≤ 0:34',pace:'≤ 5:58/km',css:'ap',
       sug:'<b>On A+ pace ✓</b> Section 2 is mixed terrain — push runnable descents ≤157 bpm, walk climbs ≤149 bpm. Main climb around km 8–9. Nrgy Drink done by km 10. Target AS2 by <b>1:25</b>.'},
      {g:'a',l:'A',c:'#2d6a0a',win:'0:34–0:37',pace:'5:59–6:29',css:'a',
       sug:'<b>On A pace ✓</b> Walk climbs ≤143 bpm, run all descents. Nrgy Drink done by km 10. Target AS2 by <b>1:33</b>.'},
      {g:'b',l:'B',c:'#185FA5',win:'0:37–0:41',pace:'6:30–7:11',css:'b',
       sug:'<b>On B pace ✓</b> Walk all grades ≤132 bpm. Jog descents and flats only. Nrgy Drink done by km 10. Target AS2 by <b>1:45</b>.'},
      {g:'off',l:'?',c:'#888',win:'> 0:41',pace:'> 7:11',css:'off',
       sug:'<b>Behind pace.</b> Hot day — don\'t chase it. Walk all climbs, HR ≤125 bpm. Arrive at AS2 as fresh as possible.'}
    ]
  },
  {
    id:'as2',km:'11.1 km',name:'Aid Station 2 ★',temp:'28 °C',
    sub:'+295 m / −232 m · Rolling climb + descent',
    isFinish:false,
    actions:[
      'Consumed one gel (60 min mark).',
      'Nrgy Drink — fully consumed.',
      'Refill both flasks (500 ml + 250 ml).',
      'Foldable cup — 200 ml.',
      'Wet towel or ice, if needed.'
    ],
    matrix:[
      {g:'ap',l:'A+',c:'#B87317',win:'≤ 1:25',pace:'≤ 7:39/km',css:'ap',
       sug:'<b>A+ is alive ✓</b> Section 3 is rolling with net descent (+201/−281 m). Push descents ≤157 bpm, walk pitches ≤149 bpm. Sip water every 10 min. Gel 3 at 1:30. Target AS3 by <b>1:53</b>.'},
      {g:'a',l:'A',c:'#2d6a0a',win:'1:25–1:33',pace:'7:40–8:22',css:'a',
       sug:'<b>On A track ✓</b> Walk sharp grades ≤143 bpm, run descents. Sip every 10 min. Gel 3 at 1:30. Target AS3 by <b>2:04</b>.'},
      {g:'b',l:'B',c:'#185FA5',win:'1:33–1:45',pace:'8:23–9:27',css:'b',
       sug:'<b>On B track ✓</b> Walk all climbs ≤132 bpm. Jog descents. Sip every 10 min. Gel 3 at 1:30. Target AS3 by <b>2:18</b>.'},
      {g:'off',l:'?',c:'#888',win:'> 1:45',pace:'> 9:27',css:'off',
       sug:'<b>Behind pace.</b> Walk everything. Sip water every 10 min. Focus on reaching AS3 with energy for the final runout.'}
    ]
  },
  {
    id:'as3',km:'16.2 km',name:'Aid Station 3',temp:'29 °C',
    sub:'+201 m / −281 m · Rolling terrain, net descent',
    isFinish:false,
    actions:[
      'Consumed one gel (90 min mark).',
      'Foldable cup — 200 ml.',
      'Refill spare flask if possible.',
      'Wet towel or ice, if needed.'
    ],
    matrix:[
      {g:'ap',l:'A+',c:'#B87317',win:'≤ 1:53',pace:'≤ 6:58/km',css:'ap',
       sug:'<b>A+ secured ✓</b> Manage 55 m climb first ≤149 bpm. Gel 4 at 2:00. From ~km 17.5 push hard on 3 km runout — up to 160 bpm from km 19. Empty both flasks.'},
      {g:'a',l:'A',c:'#2d6a0a',win:'1:53–2:04',pace:'6:59–7:39',css:'a',
       sug:'<b>On A track ✓</b> Manage 55 m climb ≤143 bpm. Gel 4 at 2:00. Build to ≤149 bpm on the 3 km runout. Drink everything left.'},
      {g:'b',l:'B',c:'#185FA5',win:'2:04–2:18',pace:'7:40–8:31',css:'b',
       sug:'<b>On B track ✓</b> Walk 55 m climb ≤132 bpm. Gel 4 at 2:00. Build to ≤143 bpm on the 3 km runout. Empty both flasks.'},
      {g:'off',l:'?',c:'#888',win:'> 2:18',pace:'> 8:31',css:'off',
       sug:'<b>Behind pace.</b> Walk the climb then run the full 3 km runout — no HR limit from km 17.5. Give everything left.'}
    ]
  },
  {
    id:'fin',km:'21.35 km',name:'Finish 🏁',temp:'30 °C',
    sub:'+86 m / −118 m · 55 m climb, then 3 km descending runout',
    isFinish:true,
    actions:[
      'Consumed one gel (120 min mark).',
      'Both flasks — fully consumed.'
    ],
    matrix:null
  }
];

/* ─── STATE ─────────────────────────────────────────────────────────── */
var curGoal = 'ap';
var cbState = {};   // key: "cpid-idx" → bool
var mxSel   = {};   // key: cpid       → goal string
var cpDone  = [false,false,false,false];

/* ─── RENDER ────────────────────────────────────────────────────────── */
function render(){
  var html = '';
  for(var i=0;i<CPS.length;i++) html += buildCard(CPS[i], i);
  document.getElementById('body').innerHTML = html;
}

function buildCard(cp, idx){
  var g   = G[curGoal];
  var cpd = g.cps[idx];
  var dnC = cpDone[idx] ? ' done' : '';

  /* stats */
  var stats =
    '<div class="stats">' +
      stat(cpd.time, 'Target time', g.color) +
      stat(cpd.hr + ' bpm', 'HR cap', cpd.hrCol) +
      stat(cpd.pace, 'Avg pace', '#555', '15px') +
    '</div>';

  /* checklist */
  var cl = '<div class="checklist"><div class="cl-hdr">'+(cp.isFinish?'Recap':'Checklist')+'</div>';
  for(var j=0;j<cp.actions.length;j++){
    var k   = cp.id+'-'+j;
    var on  = cbState[k];
    cl += '<div class="cl-item" onclick="toggleCB(\''+cp.id+'\','+j+')">' +
            '<div class="cl-box'+(on?' on':'')+'"></div>' +
            '<div class="cl-text'+(on?' done':'\'')+'">'+cp.actions[j]+'</div>' +  // bug fix below
          '</div>';
  }
  cl += '</div>';

  /* matrix */
  var mx = '';
  if(cp.matrix){
    mx = '<div class="matrix"><div class="mx-hdr">Where are you?</div><div class="mx-rows">';
    for(var k2=0;k2<cp.matrix.length;k2++){
      var mr  = cp.matrix[k2];
      var sel = (mxSel[cp.id]===mr.g);
      mx += '<button class="mx-btn'+(sel?' sel-'+mr.css:'')+'" onclick="pickMx(\''+cp.id+'\',\''+mr.g+'\')">' +
              '<div class="mx-lbl" style="color:'+mr.c+'">'+mr.l+'</div>' +
              '<div class="mx-body"><div class="mx-win">'+mr.win+'</div><div class="mx-pace">'+mr.pace+'</div></div>' +
            '</button>' +
            '<div class="mx-sug sug-'+mr.css+(sel?' show':'')+'" id="sug-'+cp.id+'-'+mr.g+'">'+mr.sug+'</div>';
    }
    mx += '</div></div>';
  } else if(cp.isFinish){
    mx = '<div class="matrix" style="text-align:center;padding:14px 14px 8px;font-size:14px;color:var(--muted)">You made it. Everything on the course. 🏁</div>';
  }

  /* mark button */
  var mkLabel = cp.isFinish ? (cpDone[idx]?'🏁 Done!':'Mark as finished') : (cpDone[idx]?'✓ Passed':'Mark as passed');
  var mark = '<div class="mark-row"><button class="mark-btn'+(cpDone[idx]?' done':'')+'" onclick="markCP('+idx+')">'+ mkLabel +'</button></div>';

  return '<div class="cp-card'+dnC+'" id="card-'+idx+'">' +
    '<div class="ct">' +
      '<div class="ct-top"><span class="ct-km">'+cp.km+'</span><span class="ct-temp">🌡 '+cp.temp+'</span></div>' +
      '<div class="ct-name">'+cp.name+'</div>' +
      '<div class="ct-sub">'+cp.sub+'</div>' +
    '</div>' +
    stats + cl + mx + mark +
  '</div>';
}

function stat(val, lbl, col, fz){
  return '<div class="stat"><div class="stat-val" style="color:'+col+';'+(fz?'font-size:'+fz:'')+'">'+val+'</div><div class="stat-lbl">'+lbl+'</div></div>';
}

/* ─── INTERACTIONS ──────────────────────────────────────────────────── */
function setGoal(g){
  curGoal = g;
  document.querySelectorAll('.gtab').forEach(function(b){ b.classList.remove('active'); });
  var el = document.querySelector('.g-'+g);
  if(el) el.classList.add('active');
  render();
}

function toggleCB(cpId, j){
  var k = cpId+'-'+j;
  cbState[k] = !cbState[k];
  /* re-render just this card efficiently by full render — state preserved */
  render();
}

function pickMx(cpId, gKey){
  mxSel[cpId] = (mxSel[cpId]===gKey) ? null : gKey;
  render();
  if(mxSel[cpId]){
    setTimeout(function(){
      var el = document.getElementById('sug-'+cpId+'-'+mxSel[cpId]);
      if(el) el.scrollIntoView({behavior:'smooth',block:'nearest'});
    }, 60);
  }
}

function markCP(idx){
  cpDone[idx] = !cpDone[idx];
  render();
  if(cpDone[idx]){
    var next = document.getElementById('card-'+(idx+1));
    if(next) setTimeout(function(){ next.scrollIntoView({behavior:'smooth',block:'start'}); }, 80);
  }
}

/* ─── INIT ──────────────────────────────────────────────────────────── */
render();
</script>
</body>
</html>
